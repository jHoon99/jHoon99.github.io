mainSections = ["post"]
rssFullContent = true
favicon = "img/favicon.jpg"
description = "iOS 개발자의 Flutter 독학 기록. Swift와 비교하며 정리하는 Flutter, Dart, 상태관리 블로그."

[footer]
    since = 2026

[dateFormat]
    published = "2006.01.02"
    lastUpdated = "2006.01.02"

[sidebar]
    compact = false
    subtitle = "iOS 개발자의 Flutter 공부 기록"

[article]
    headingAnchor = true
    math = false
    toc = true
    readingTime = false

    [article.list]
        showTags = true

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 15 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle = true
    default = "dark"

[imageProcessing]
    [imageProcessing.content]
        enabled = true
    [imageProcessing.thumbnail]
        enabled = true

[comments]
    enabled = false
